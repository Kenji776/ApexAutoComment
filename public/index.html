<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Class Processor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 2rem;
        }

        .container {
            background: #1e293b;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        input[type="file"] {
            margin-bottom: 1rem;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1rem 0;
            transition: background 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Apex Class Comment Generator</h1>
    <input type="file" id="fileInput" webkitdirectory directory multiple>
    <br>
    <button onclick="uploadAndProcess()">Upload & Process</button>
    <div id="status"></div>
    <!--
    <pre id="log-output" style="text-align:left; background:#0f172a; padding:1em; border-radius:8px; max-height:300px; overflow:auto; min-height:100px;"></pre>
    -->
    <progress id="progressBar" value="0" max="100" style="width: 100%; margin-top: 1em;"></progress>
    <div id="progressLabel" style="margin-top: 0.5em; font-size: 0.9em;"></div>
</div>

<script>
    console.log('Apex Commenter Loaded')
    let eventSource = null;

    function startLogStream() {
        console.log('STarting logging stream')
        const logDisplay = document.getElementById("log-output");
        logDisplay.innerText = ""; // clear old logs

        eventSource = new EventSource("/logs");
        eventSource.onmessage = function (event) {
            try {
                console.log('Progress Event');
                console.log(event.data);
                const msg = JSON.parse(event.data);

                console.log('Got progress data');
                console.log(msg);
                if (msg.type === "progress") {
                    const percentage = Math.floor((msg.current / msg.total) * 100);
                    document.getElementById("progressBar").value = percentage;
                    document.getElementById("progressLabel").textContent =
                        `${msg.status} (${msg.current}/${msg.total})`;
                } else if (msg.type === "complete") {
                    document.getElementById("progressBar").value = 100;
                    document.getElementById("progressLabel").textContent = msg.status;
                } else {
                    document.getElementById("log-output").textContent += msg + '<br/>';
                }
            } catch (e) {
                // Fallback to raw log if not JSON
                document.getElementById("log-output").textContent += event.data + '<br/>';

                console.log('Error');
                console.log(e);
            }

            const logBox = document.getElementById("log-output");
            logBox.scrollTop = logBox.scrollHeight;
        };
    }

    function stopLogStream() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
    }

    async function uploadAndProcess() {
        startLogStream(); // start listening
        const files = document.getElementById('fileInput').files;
        if (!files.length) {
            document.getElementById('status').textContent = 'Please select some files.';
            return;
        }

        const formData = new FormData();
        for (const file of files) {
            formData.append('files', file);
        }

        document.getElementById('status').textContent = 'Uploading files...';

        // Step 1: Upload files to /upload
        const uploadResponse = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        if (!uploadResponse.ok) {
            document.getElementById('status').textContent = 'File upload failed.';
            return;
        }

        document.getElementById('status').textContent = 'Processing files...';

        // Step 2: Trigger /process
        const processResponse = await fetch('/process', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ path: 'input' })
        });


        if (processResponse.ok) {
            document.getElementById("status").textContent = "✅ Processing complete.";
        } else {
            document.getElementById("status").textContent = "❌ Error during processing.";
        }
        document.getElementById('status').textContent = 'Zipping output...';

        // Step 3: Download zip
        const zipResponse = await fetch('/download-zip');
        const blob = await zipResponse.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'processed_output.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();

        document.getElementById('status').textContent = 'Cleaning up input folder...';

        // Step 4: Cleanup
        await fetch('/cleanup-input', { method: 'POST' });

        document.getElementById('status').textContent = 'Done!';

        stopLogStream(); 
    }
</script>
</body>
</html>
